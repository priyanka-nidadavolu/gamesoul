services:

  postgres:
    image: postgres:15
    container_name: gamesoul_postgres
    environment:
      POSTGRES_USER: gamesoul
      POSTGRES_PASSWORD: gamesoul
      POSTGRES_DB: gamesoul
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./data/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gamesoul"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    container_name: gamesoul_api
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://gamesoul:gamesoul@postgres:5432/gamesoul}
      QDRANT_URL: ${QDRANT_URL:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      RAWG_API_KEY: ${RAWG_API_KEY:-}
      PORT: "8000"
    restart: on-failure
    command: uvicorn main:app --host 0.0.0.0 --port 8000

  streamlit:
    build:
      context: .
      dockerfile: streamlit_app/Dockerfile
    container_name: gamesoul_streamlit
    depends_on:
      - api
    ports:
      - "8501:8501"
    environment:
      API_BASE_URL: ${API_BASE_URL:-http://api:8000}
    command: streamlit run app.py --server.address 0.0.0.0 --server.port 8501 --server.headless true

volumes:
  postgres_data:
