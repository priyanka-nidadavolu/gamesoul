services:
  - type: web
    name: gamesoul-api
    plan: free
    rootDir: .
    runtime: docker
    dockerfilePath: Dockerfile.api
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: RAWG_API_KEY
        sync: false
      - key: QDRANT_URL
        sync: false

  - type: web
    name: gamesoul-streamlit
    plan: free
    rootDir: .
    runtime: docker
    dockerfilePath: Dockerfile.streamlit
    envVars:
      - key: API_BASE_URL
        sync: false
